<div class="timeline">
  <h2>Guía: {{ guia }}</h2>
  <p><strong>Estado Actual:</strong> {{ estadoActual }}</p>
  <p><strong>Bodega Actual:</strong> {{ bodegaActual }}</p>

  <ul>
    <li *ngFor="let item of historial">
      {{ item.fecha | date:'short' }} - {{ item.lugar }}
    </li>
  </ul>
</div>
